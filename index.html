<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PomoFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <video id="backgroundVideo" class="background-video" autoplay muted loop playsinline aria-hidden="true">
      <source src="./assets/background.mp4" type="video/mp4" />
    </video>
    <div class="background-tint" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="workspace" aria-label="Pomodoro panosu">
        <header class="topbar">
          <div>
            <p class="eyebrow">Pomodoro sitesi</p>
            <h1>PomoFlow</h1>
          </div>
          <div class="topbar-meta">
            <div class="date-pill" id="todayLabel"></div>
            <button class="settings-button" type="button" aria-label="Ayarlar" title="Ayarlar">⚙</button>
          </div>
        </header>

        <section class="timer-panel" aria-label="Pomodoro zamanlayicisi">
          <div class="session-switch" role="group" aria-label="Oturum tipi">
            <button class="switch-option active" data-mode="focus" type="button">🍅 Pomodoro</button>
            <button class="switch-option" data-mode="shortBreak" type="button">☕ Kisa mola</button>
            <button class="switch-option" data-mode="longBreak" type="button">🌙 Uzun mola</button>
          </div>

          <div class="timer-copy">
            <p class="eyebrow">Simdiki oturum</p>
            <h2 id="modeTitle">Pomodoro zamani</h2>
            <p id="modeDescription">Tek bir ise 25 dakikalik sakin bir akista kal.</p>
          </div>

          <div class="timer-ring" aria-live="polite">
            <svg viewBox="0 0 120 120" role="img" aria-label="Zamanlayici ilerlemesi">
              <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
              <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="time-readout" id="timeReadout">25:00</div>
          </div>

          <div class="timer-controls">
            <div class="duration-pills" aria-label="Hizli sureler">
              <button type="button" data-minutes="5">5 dk</button>
              <button type="button" data-minutes="25">25 dk</button>
              <button type="button" data-minutes="60">60 dk</button>
            </div>
            <button class="primary-button" id="startPauseButton" type="button">Baslat</button>
            <div class="quick-actions">
              <button class="icon-button" id="resetButton" type="button" aria-label="Sifirla" title="Sifirla">
                ↻
              </button>
              <button class="icon-button" id="skipButton" type="button" aria-label="Sonraki oturuma gec" title="Sonraki">
                ›
              </button>
            </div>
          </div>
        </section>

        <section class="task-panel" aria-label="Gorevler">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Bugunun ritmi</p>
              <h2>Gorevler</h2>
            </div>
            <span id="taskCount">0/0</span>
          </div>

          <form class="task-form" id="taskForm">
            <label class="sr-only" for="taskInput">Yeni gorev</label>
            <input id="taskInput" type="text" maxlength="80" placeholder="Bir sonraki kucuk adim..." />
            <button type="submit">Ekle</button>
          </form>

          <ul class="task-list" id="taskList"></ul>
        </section>
      </section>

      <aside class="insight-panel" aria-label="Ozet">
        <section class="stat-block">
          <p class="eyebrow">Tamamlanan pomo</p>
          <strong id="focusCount">0</strong>
          <span>oturum</span>
        </section>

        <section class="quote-block">
          <p id="quoteText"></p>
        </section>

        <section class="music-block" aria-label="Spotify muzik">
          <div>
            <p class="eyebrow">Calisma sesi</p>
            <h2>Spotify</h2>
          </div>
          <iframe
            id="spotifyPlayer"
            title="Spotify oynatici"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
          ></iframe>
          <form class="spotify-form" id="spotifyForm">
            <label class="sr-only" for="spotifyUrl">Spotify linki</label>
            <input id="spotifyUrl" type="url" placeholder="Spotify sarki, album ya da playlist linki" />
            <button type="submit">Koy</button>
          </form>
        </section>
      </aside>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
